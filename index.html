  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"uk\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>Кухня — SKVOT<\u002Ftitle>\n<script src=\"90826b57-d07f-4108-9bc6-b8e0eb98f284\"><\u002Fscript>\n<style>/* SKVOT design system — global entry point.\n   Consumers link THIS file only. Import order: fonts, then tokens. */\n/* ============================================================\n   SKVOT — Webfonts\n   Two typefaces mirror the \"onoffline\" concept:\n   · Helvetica Neue Cyr  — the \"on(line)\" grotesque workhorse\n   · SKVOT PIXEL         — the \"offline\" pixel-grid display face\n     (three grid resolutions: 10 = fine, 20 = medium, 40 = coarse)\n   ============================================================ */\n\n@font-face {\n  font-family: \"Helvetica Neue Cyr\";\n  src: url(\"9dd585b3-3b28-44bd-b87c-6dadae7dfbdd\") format(\"truetype\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Helvetica Neue Cyr\";\n  src: url(\"91c4f958-7834-4b1d-9458-df21de32fda9\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Helvetica Neue Cyr\";\n  src: url(\"ce151ba0-54a0-4717-be1b-e10f7fc260a8\") format(\"truetype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Helvetica Neue Cyr\";\n  src: url(\"e23ac7de-9031-418a-926a-3e8b47c1d858\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Helvetica Neue Cyr\";\n  src: url(\"248d4aa7-3a99-4081-b0c6-538c4a37ff03\") format(\"truetype\");\n  font-weight: 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* SKVOT PIXEL — medium grid is the default display cut */\n@font-face {\n  font-family: \"SKVOT Pixel\";\n  src: url(\"5a6ef9cd-8af3-4665-92ea-23d111a0cf99\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n/* Fine grid — smoother, use at larger sizes */\n@font-face {\n  font-family: \"SKVOT Pixel Fine\";\n  src: url(\"173b076e-d110-402f-af45-b84fa9a17731\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n/* Coarse grid — chunky, use for accents & short bursts */\n@font-face {\n  font-family: \"SKVOT Pixel Coarse\";\n  src: url(\"c3f26b7e-eafc-4682-9203-e69884c292ed\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ============================================================\n   SKVOT — Color tokens\n   The core system is radically monochrome: near-pure black type\n   on white or warm paper. Saturated \"course identity\" colors are\n   used one-at-a-time as full-bleed backgrounds or highlights —\n   never mixed together, never as gradients.\n   ============================================================ */\n:root {\n  /* ---- Ink & paper (the base system) ---- */\n  --skvot-black: #0A0A0A;      /* type + UI ink — not pure #000, slightly soft */\n  --skvot-true-black: #000000; /* full-bleed dark backgrounds */\n  --skvot-white: #FFFFFF;\n  --skvot-paper: #EDEBE4;      /* warm off-white — the \"light gray\" poster bg */\n  --skvot-paper-2: #E3E0D6;    /* a touch deeper paper */\n\n  /* ---- Grays ---- */\n  --skvot-gray-90: #1A1A1A;\n  --skvot-gray-70: #4D4D4D;\n  --skvot-gray-50: #808080;\n  --skvot-gray-30: #B3B3B3;\n  --skvot-gray-15: #D9D9D9;\n  --skvot-gray-08: #EBEBEB;\n\n  /* ---- Course identity colors (used solo, full-bleed) ---- */\n  --skvot-coral: #FF8C6B;      /* peach/coral — signature warm accent */\n  --skvot-lime: #C8F135;       /* acid green */\n  --skvot-blue: #2C4BFF;       /* electric klein-ish blue */\n  --skvot-yellow: #FFE500;     /* pure yellow */\n  --skvot-lilac: #C9B6FF;      /* soft lilac */\n  --skvot-red: #FF3B2F;        /* alarm red */\n\n  /* ---- Semantic aliases ---- */\n  --bg-page: var(--skvot-white);\n  --bg-inverse: var(--skvot-true-black);\n  --bg-paper: var(--skvot-paper);\n  --surface-card: var(--skvot-white);\n  --surface-raised: var(--skvot-white);\n\n  --text-primary: var(--skvot-black);\n  --text-inverse: var(--skvot-white);\n  --text-muted: var(--skvot-gray-50);\n  --text-subtle: var(--skvot-gray-70);\n\n  --border-ink: var(--skvot-black);\n  --border-hairline: var(--skvot-gray-15);\n\n  --accent: var(--skvot-coral);\n  --accent-on: var(--skvot-black);\n\n  --focus-ring: var(--skvot-blue);\n  --link: var(--skvot-black);\n  --link-hover: var(--skvot-blue);\n}\n\n/* ============================================================\n   SKVOT — Typography tokens\n   System pairs two voices:\n   · Display  → SKVOT Pixel (offline / pixel-grid) OR Helvetica Black\n                set TIGHT, UPPERCASE, condensed feel via negative tracking.\n   · Text     → Helvetica Neue Cyr for everything readable.\n   Headlines are almost always ALL-CAPS, heavy, and set on tight\n   line-height (0.92–1.0). Body is sentence case, Roman/Medium.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: \"SKVOT Pixel\", \"Helvetica Neue Cyr\", Arial, sans-serif;\n  --font-display-fine: \"SKVOT Pixel Fine\", \"Helvetica Neue Cyr\", Arial, sans-serif;\n  --font-display-coarse: \"SKVOT Pixel Coarse\", \"Helvetica Neue Cyr\", Arial, sans-serif;\n  --font-sans: \"Helvetica Neue Cyr\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --font-heading: \"Helvetica Neue Cyr\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n\n  /* ---- Weights ---- */\n  --fw-light: 300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* ---- Fluid display sizes ---- */\n  --fs-display-1: clamp(3.5rem, 8vw, 7rem); /* @kind font */\n  --fs-display-2: clamp(2.75rem, 6vw, 5rem); /* @kind font */\n  --fs-h1: clamp(2.25rem, 4.5vw, 3.5rem); /* @kind font */\n  --fs-h2: clamp(1.75rem, 3vw, 2.5rem); /* @kind font */\n  --fs-h3: 1.5rem; /* @kind font */\n  --fs-h4: 1.25rem; /* @kind font */\n\n  /* ---- Text sizes ---- */\n  --fs-lead: 1.375rem; /* @kind font */\n  --fs-body: 1.0625rem; /* @kind font */\n  --fs-body-sm: 0.9375rem; /* @kind font */\n  --fs-caption: 0.8125rem; /* @kind font */\n  --fs-micro: 0.6875rem; /* @kind font */\n\n  /* ---- Line heights ---- */\n  --lh-display: 0.92; /* @kind font */\n  --lh-heading: 1.0; /* @kind font */\n  --lh-snug: 1.15; /* @kind font */\n  --lh-body: 1.5; /* @kind font */\n\n  /* ---- Tracking ---- */\n  --ls-tight: -0.03em; /* @kind font */\n  --ls-normal: 0em; /* @kind font */\n  --ls-label: 0.02em; /* @kind font */\n  --ls-caps: 0.06em; /* @kind font */\n\n  /* ---- Semantic ---- */\n  --text-display-family: var(--font-heading);\n  --text-body-family: var(--font-sans);\n}\n\n/* Utility recipes (optional, consumers may use these directly) */\n.skvot-display {\n  font-family: var(--font-heading);\n  font-weight: var(--fw-black);\n  text-transform: uppercase;\n  line-height: var(--lh-display);\n  letter-spacing: var(--ls-tight);\n}\n.skvot-pixel {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  line-height: var(--lh-heading);\n  letter-spacing: 0.01em;\n}\n.skvot-label {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-caps);\n  font-size: var(--fs-caption);\n}\n\n/* ============================================================\n   SKVOT — Spacing, radius, borders, motion\n   The identity is built on hard edges and a strict grid. Radii\n   are minimal (mostly square; pills only for buttons/tags).\n   Borders are heavy black hairlines. Shadows are essentially\n   absent — depth comes from flat color blocks, not elevation.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---- Layout ---- */\n  --page-max: 1280px; /* @kind other */\n  --page-gutter: clamp(16px, 4vw, 64px); /* @kind other */\n  --grid-cols: 12; /* @kind other */\n\n  /* ---- Radius (mostly square) ---- */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-pill: 999px;     /* buttons & tags */\n\n  /* ---- Borders ---- */\n  --border-w: 1.5px;        /* standard ink hairline */\n  --border-w-bold: 2.5px;   /* emphasized outlines */\n  --border-ink-rule: var(--border-w) solid var(--skvot-black);\n\n  /* ---- Shadow (used sparingly, hard-edged) ---- */\n  --shadow-none: none;\n  --shadow-hard: 4px 4px 0 var(--skvot-black);  /* offset block, no blur */\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 220ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n  --marquee-dur: 22s; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }\n\n/* ============ THEME (light = kitchen open / dark = blackout) ============ */\n:root {\n  --bg: #EDEBE4;            /* warm paper */\n  --ink: #0A0A0A;\n  --card: #FFFFFF;\n  --line: #0A0A0A;\n  --muted: #8A857A;\n  --dash: rgba(10,10,10,.35);\n  --track: rgba(10,10,10,.16);\n\n  /* semantic feedback */\n  --ok: #C8F135;            /* skvot acid lime */\n  --ok-line: #6f8f00;\n  --ok-text: #3f5300;\n  --ok-tint: rgba(200,241,53,.30);\n  --ok-glow: rgba(160,205,20,.55);\n\n  --bad: #FF3B2F;           /* skvot alarm red */\n  --bad-line: #FF3B2F;\n  --bad-text: #C42217;\n  --bad-tint: rgba(255,59,47,.12);\n  --bad-glow: rgba(255,59,47,.45);\n\n  --bw: 1.5px;\n  --bw-bold: 2.5px;\n}\nbody.dark {\n  --bg: #000000;\n  --ink: #F2F2F2;\n  --card: #0E0E0E;\n  --line: #F2F2F2;\n  --muted: #5a5a5a;\n  --dash: rgba(242,242,242,.28);\n  --track: rgba(242,242,242,.14);\n\n  --ok-line: var(--ok);\n  --ok-text: var(--ok);\n  --ok-tint: rgba(200,241,53,.10);\n  --ok-glow: rgba(200,241,53,.75);\n\n  --bad: #FF5B50;\n  --bad-line: #FF5B50;\n  --bad-text: #FF5B50;\n  --bad-tint: rgba(255,91,80,.10);\n  --bad-glow: rgba(255,91,80,.7);\n}\n\nhtml, body {\n  min-height: 100%;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-sans);\n  overscroll-behavior: none;\n  user-select: none;\n  transition: background .35s ease, color .35s ease;\n}\n\n.px { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.01em; }\n.mono { font-family: \"SF Mono\", ui-monospace, \"Roboto Mono\", Menlo, monospace; font-variant-numeric: tabular-nums; }\n\n#app {\n  min-height: 100vh;\n  display: flex;\n  flex-direction: column;\n  padding: 0 18px 42px;\n  max-width: 480px;\n  margin: 0 auto;\n}\n\n/* ============ KITCHEN PASS / HEADER ============ */\n.pass {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 22px 0 10px;\n}\n.brand { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; display:flex; align-items:center; gap:7px; }\n.brand .p { opacity: .45; }\n.station {\n  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;\n  color: var(--muted); display:flex; align-items:center; gap:6px;\n}\n.station .dotlive { width:7px; height:7px; border-radius:999px; background: var(--ok-line); box-shadow: 0 0 8px var(--ok-glow); }\nbody.dark .station .dotlive { background: var(--bad); box-shadow: 0 0 10px var(--bad-glow); }\n\n.prog-track { height: var(--bw); background: var(--track); margin-bottom: 24px; }\n.prog-fill { height: 3px; margin-top: -0.75px; background: var(--ink); transition: width .5s cubic-bezier(0.22,1,0.36,1); }\n\n/* ============ ORDER SLIP (receipt) ============ */\n.slip {\n  position: relative;\n  background: var(--card);\n  border: var(--bw) solid var(--line);\n  padding: 22px 22px 26px;\n  margin-bottom: 24px;\n}\n/* torn receipt bottom edge */\n.slip::after {\n  content: \"\";\n  position: absolute; left: -1.5px; right: -1.5px; bottom: -9px; height: 10px;\n  background:\n    linear-gradient(45deg, var(--bg) 50%, transparent 51%) 0 0 / 12px 12px repeat-x,\n    linear-gradient(-45deg, var(--bg) 50%, transparent 51%) 0 0 / 12px 12px repeat-x;\n}\n.slip-header {\n  display: flex; justify-content: space-between; align-items: center;\n  margin-bottom: 16px; padding-bottom: 14px;\n  border-bottom: var(--bw) dashed var(--dash);\n}\n.slip-meta { display:flex; flex-direction:column; gap:4px; }\n.slip-tag { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); font-weight: 700; }\n.slip-station { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 700; }\n.slip-num { font-size: 13px; color: var(--ink); font-weight: 700; }\n.slip-q { font-size: 18px; font-weight: 500; color: var(--ink); line-height: 1.4; letter-spacing: -.01em; }\n\n/* ============ COUNTER ============ */\n.counter-area { text-align: center; margin: 24px 0 14px; }\n.counter-num { font-size: 92px; color: var(--ink); line-height: .88; display: block; }\n.counter-num.bump { animation: bump .15s ease; }\n@keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }\n.counter-unit { font-size: 11px; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700; }\n\n/* ============ BURGER TRAY (pass) ============ */\n.tray-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700; color: var(--muted); margin-bottom: 8px; }\n.burger-grid {\n  min-height: 62px;\n  display: flex; flex-wrap: wrap; gap: 3px;\n  justify-content: center; align-items: center;\n  margin-bottom: 22px; padding: 12px;\n  background: var(--card);\n  border: var(--bw) dashed var(--dash);\n}\n.b { font-size: 20px; display: inline-block; animation: bpop .2s cubic-bezier(0.34,1.56,0.64,1) both; }\n@keyframes bpop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }\n\n/* ============ SLIDER ============ */\n.slider-wrap { margin-bottom: 12px; }\ninput[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; background: var(--ink); outline: none; cursor: pointer; }\ninput[type=range]::-webkit-slider-thumb {\n  -webkit-appearance: none; width: 30px; height: 30px; border-radius: 999px;\n  background: var(--bg); border: var(--bw-bold) solid var(--ink); cursor: pointer; transition: transform .12s;\n}\ninput[type=range]::-webkit-slider-thumb:active { transform: scale(1.16); }\ninput[type=range]::-moz-range-thumb { width: 30px; height: 30px; border-radius: 999px; background: var(--bg); border: var(--bw-bold) solid var(--ink); cursor: pointer; }\n.slider-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 10px; font-weight: 700; }\n\n/* ============ BUTTONS ============ */\n.primary-btn {\n  width: 100%; padding: 17px;\n  background: var(--ink); color: var(--bg);\n  border: var(--bw) solid var(--ink); border-radius: 999px;\n  font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;\n  cursor: pointer; font-family: var(--font-sans);\n  transition: background .12s, color .12s, transform .1s; margin-top: 10px;\n}\n.primary-btn:hover { background: var(--bg); color: var(--ink); }\n.primary-btn:active { transform: translateY(1px) scale(.995); }\n\n/* ============ RESULT ============ */\n.result-cols { display: flex; gap: 12px; margin-bottom: 18px; }\n.r-col {\n  flex: 1; background: var(--card);\n  border: var(--bw) solid var(--line);\n  padding: 16px; text-align: center;\n  transition: box-shadow .3s, border-color .3s, background .3s;\n}\n.r-col-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 700; }\n.r-num { font-size: 48px; color: var(--ink); line-height: .9; margin-bottom: 8px; }\n.r-burgers { font-size: 14px; min-height: 18px; }\n\n/* glow states */\n.glow-ok {\n  border-color: var(--ok-line);\n  background: var(--ok-tint);\n  box-shadow: inset 0 0 0 1px var(--ok-line), 0 0 26px 0 var(--ok-glow);\n}\n.glow-ok .r-col-label { color: var(--ok-text); }\n.glow-ok .r-num { color: var(--ok-text); }\n.glow-bad {\n  border-color: var(--bad-line);\n  background: var(--bad-tint);\n  box-shadow: inset 0 0 0 1px var(--bad-line), 0 0 26px 0 var(--bad-glow);\n}\n.glow-bad .r-col-label { color: var(--bad-text); }\n.glow-bad .r-num { color: var(--bad-text); }\n\n.verdict-text { font-size: 15px; line-height: 1.55; margin-bottom: 16px; text-align: center; font-weight: 600; }\n.verdict-text.ok { color: var(--ok-text); }\n.verdict-text.bad { color: var(--bad-text); }\n.fact-box {\n  font-size: 13px; color: var(--ink); line-height: 1.6;\n  padding: 16px 18px; background: var(--card);\n  border: var(--bw) solid var(--line); border-left: var(--bw-bold) solid var(--ink);\n  margin-bottom: 22px;\n}\n.fact-label { display:block; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 700; color: var(--muted); margin-bottom: 8px; }\n\n/* ============ INTRO / FINAL ============ */\n.screen { flex: 1; display: flex; flex-direction: column; padding-top: 40px; }\n.screen-eyebrow { display:inline-flex; align-items:center; gap:8px; font-size: 12px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink); margin-bottom: 24px; font-weight: 700; }\n.ticket-stub {\n  border: var(--bw) solid var(--line); background: var(--card);\n  padding: 11px 14px; margin-bottom: 22px;\n  display: flex; justify-content: space-between; align-items:center; gap: 12px;\n  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted);\n}\n.ticket-stub span { white-space: nowrap; }\n.station { white-space: nowrap; }\n.screen-title { font-size: 44px; color: var(--ink); line-height: .9; margin-bottom: 18px; }\n.screen-sub { font-size: 16px; color: var(--ink); line-height: 1.5; margin-bottom: auto; opacity: .82; max-width: 34ch; font-weight: 500; }\n.note-blackout { display:flex; align-items:center; gap:8px; margin-top: 20px; font-size: 13px; font-weight: 700; color: var(--ink); }\n.note-blackout .bolt { color: var(--bad-text); }\n\n.score-card { background: var(--ink); color: var(--bg); border: var(--bw) solid var(--ink); padding: 30px 24px; text-align: center; margin: 28px 0; }\n.score-big { font-size: 74px; color: var(--bg); line-height: .85; margin-bottom: 10px; }\n.score-big .slash { opacity: .4; }\n.score-sub { font-size: 11px; color: color-mix(in srgb, var(--bg) 55%, transparent); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700; }\n.score-bl { margin: 12px 0 16px; padding-top: 14px; border-top: var(--bw) solid color-mix(in srgb, var(--bg) 22%, transparent); font-size: 12px; font-weight: 700; text-transform:uppercase; letter-spacing:.08em; color: color-mix(in srgb, var(--bg) 60%, transparent); display:flex; align-items:center; justify-content:center; gap:8px; }\n.score-bl .bolt { color: var(--ok); }\n.score-title { font-size: 28px; color: var(--bg); margin-bottom: 8px; }\n.score-desc { font-size: 14px; color: color-mix(in srgb, var(--bg) 78%, transparent); line-height: 1.55; font-weight: 500; }\n\n@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }\n.animate-in { animation: fadeUp .28s cubic-bezier(0.22,1,0.36,1) forwards; }\n\n/* ============ BLACKOUT ROUND ============ */\n@keyframes flicker {\n  0%{opacity:1} 8%{opacity:.05} 12%{opacity:1} 20%{opacity:.1} 24%{opacity:1}\n  55%{opacity:1} 62%{opacity:.1 m; box-shadow: 0 0 18px var(--ok-glow); }\n.bl-score-badge.warn { border-color: var(--bad-line); color: var(--bad-text); box-shadow: 0 0 18px var(--bad-glow); }\n\n/* alarm glow — pulsing black/red vignette during blackout */\n#alarm { position: fixed; inset: 0; pointer-events: none; z-index: 40; opacity: 0; transition: opacity .5s ease; }\n#alarm.on { opacity: 1; animation: alarmPulse 1.7s ease-in-out infinite; }\n@keyframes alarmPulse {\n  0%,100% { box-shadow: inset 0 0 130px 8px rgba(255,59,47,.12); background: transparent; }\n  45%     { box-shadow: inset 0 0 200px 34px rgba(255,59,47,.16); background: transparent; }\n  50%     { box-shadow: inset 0 0 240px 60px rgba(255,59,47,.55); background: rgba(30,0,0,.34); }\n  55%     { box-shadow: inset 0 0 200px 34px rgba(255,59,47,.16); background: transparent; }\n}\n\n/* glitch shift timer (after a shaky blackout) */\n.shift-bar { display: flex; align-items: center; gap: 10px; margin: 2px 0 20px; }\n.shift-track { flex: 1; height: 6px; background: var(--track); overflow: hidden; }\n.shift-fill { height: 100%; width: 100%; background: var(--bad); box-shadow: 0 0 14px var(--bad-glow); transition: width .12s linear; }\n.shift-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--bad-text); white-space: nowrap; }\n.shift-label .bolt { animation: shiftBlink 1s steps(2,end) infinite; }\n@keyframes shiftBlink { 50% { opacity: .25; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\"><div id=\"root\"><\u002Fdiv><\u002Fdiv>\n<div id=\"alarm\"><\u002Fdiv>\n<script>\nif (window.Telegram?.WebApp) {\n  Telegram.WebApp.ready();\n  Telegram.WebApp.expand();\n}\nfunction setTheme(dark) {\n  document.body.classList.toggle('dark', dark);\n  const c = dark ? '#000000' : '#EDEBE4';\n  if (window.Telegram?.WebApp) { Telegram.WebApp.setHeaderColor(c); Telegram.WebApp.setBackgroundColor(c); }\n}\nsetTheme(false);\n\n/* ======= KITCHEN QUESTIONS (GTA) ======= */\nconst KITCHEN_Q = [\n  { num:\"01\", station:\"РОЗШУК\", order:\"Скільки зірок розшуку є в GTA V?\", answer:5, min:1, max:8, unit:\"зірок розшуку\",\n    fact:\"5 зірок — максимум в серії GTA. При п'яти зірках за тобою летять вертольоти, FIB і важкоозброєний спецназ.\",\n    v:{ exact:\"Точно. Шеф вражений.\", close:\"Майже — одна зірка туди-сюди.\", far:\"Не вгадав. У серії завжди 5 зірок.\", bad:\"У GTA V рівно 5 зірок розшуку. Більше — і тебе шукає вся поліція Лос-Сантоса.\" } },\n  { num:\"02\", station:\"КАСТ\", order:\"Скільки головних ігрових персонажів у GTA V?\", answer:3, min:1, max:6, unit:\"персонажі\",\n    fact:\"Майкл Де Санта, Тревор Філіпс і Франклін Клінтон. Вперше в серії можна перемикатись між персонажами в реальному часі.\",\n    v:{ exact:\"Точно. Say my name!\", close:\"Майже — один зайвий або не вистачає.\", far:\"Не вгадав. Їх троє.\", bad:\"Трьох: Майкл, Тревор, Франклін. Механіка перемикання стала однією з ключових фіч гри.\" } },\n  { num:\"03\", station:\"РЕЛІЗ\", order:\"Скільки років минуло між виходом GTA IV і GTA V?\", answer:5, min:1, max:10, unit:\"років\",\n    fact:\"GTA IV — 2008, GTA V — 2013. П'ять років розробки і одна з найочікуваніших ігор в історії.\",\n    v:{ exact:\"Точно. П'ять років очікування!\", close:\"Майже — рік туди-сюди.\", far:\"Не вгадав. Між IV і V — рівно 5 років.\", bad:\"GTA IV вийшла у 2008, V — у 2013. П'ять років і карколомні продажі в перший день.\" } },\n  { num:\"04\", station:\"ПРОДАЖІ\", order:\"Скільки мільйонів копій GTA V продала за перший тиждень?\", answer:11, min:1, max:25, unit:\"мільйонів копій\",\n    fact:\"11.21 мільйона за перший тиждень. GTA V заробила $1 млрд за перші 3 дні — рекорд для розваг того часу.\",\n    v:{ exact:\"Шеф плаче від щастя. Ідеально!\", close:\"Майже — один мільйон туди-сюди. Непогано!\", far:\"Значно більше, ніж здається. Або менше?\", bad:\"11 мільйонів копій за перший тиждень і мільярд доларів за три дні. Рекорд індустрії.\" } },\n  { num:\"05\", station:\"СЕРІЯ\", order:\"Скільки ігор основної серії GTA вийшло до GTA 6?\", answer:5, min:2, max:10, unit:\"ігор\",\n    fact:\"GTA III, Vice City, San Andreas, GTA IV, GTA V — п'ять ігор основної 3D-серії. Плюс десятки спін-офів і портів.\",\n    v:{ exact:\"Точно! Шеф задоволений.\", close:\"Майже — одна гра туди-сюди.\", far:\"Не вгадав. П'ять основних частин.\", bad:\"GTA III (2001), Vice City (2002), San Andreas (2004), GTA IV (2008), GTA V (2013) — п'ять ігор основної серії до виходу GTA 6.\" } }\n];\n\n/* ======= BLACKOUT QUESTIONS (true/false) ======= */\nconst BLACKOUT_Q_POOL = [\n  { t:\"GTA Vice City відбувається у 1986 році\", a:true },\n  { t:\"Рей Ліотта озвучив Томмі Версетті у Vice City\", a:true },\n  { t:\"GTA III вийшла у 2001 році\", a:true },\n  { t:\"У GTA V можна грати від першої особи лише на PC\", a:false },\n  { t:\"Головного героя GTA IV звуть Ніко Белліч\", a:true },\n  { t:\"Перший трейлер GTA 6 вийшов у 2022 році\", a:false },\n  { t:\"Los Santos у GTA V заснований на Лос-Анджелесі\", a:true },\n  { t:\"GTA San Andreas вийшла у 2004 році\", a:true },\n  { t:\"GTA Chinatown Wars спочатку вийшла для Nintendo DS\", a:true },\n  { t:\"GTA IV отримала оцінку 10/10 від IGN\", a:true },\n  { t:\"GTA 6 відбуватиметься у вигаданому штаті Леоніда\", a:true },\n  { t:\"GTA Online вийшов у той самий день що і GTA V\", a:false },\n  { t:\"Головного героя GTA San Andreas звуть CJ\", a:true },\n  { t:\"GTA V — найпродаваніша гра Rockstar в історії\", a:true },\n  { t:\"GTA III — перша гра серії у 3D\", a:true },\n  { t:\"Disney купив Rockstar Games у 2014 році\", a:false },\n  { t:\"У GTA Vice City можна купити власні підприємства\", a:true },\n  { t:\"Дія GTA IV відбувається в Liberty City\", a:true }\n];\n\n/* ======= STATE ======= */\nlet kitchenIdx = 0, kitchenScore = 0, blackoutScore = 0, blackoutDone = false;\nlet blQList = [], blQIdx = 0, blCorrect = 0, blRafId = null;\nlet blTimeLeft = 1.0, blLastTs = null, blCanAnswer = true, afterBlackout = null;\nconst BL_DRAIN = 0.092, BL_BONUS = 0.20, BL_PENALTY = 0.09;   // a touch faster\n\n/* glitch shift-timer state (triggered by a shaky 1–2/3 blackout) */\nlet shiftMode = false, shiftLeft = 0, shiftRunning = false, shiftLast = null, shiftRafId = null;\nconst SHIFT_MS = 38000;\n\nfunction alarm(on){ const a=document.getElementById('alarm'); if(a) a.classList.toggle('on', on); }\n\nfunction shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }\nfunction burgerStr(n){ if(n>15) return '🍔 × '+n; return '🍔'.repeat(n); }\nfunction pts(q,v){ const d=Math.abs(v-q.answer), p=d/q.answer; return d===0?3:p<=.17?2:p<=.5?1:0; }\nfunction verdict(q,v){ const d=Math.abs(v-q.answer), p=d/q.answer; return d===0?q.v.exact:p<=.17?q.v.close:p<=.5?q.v.far:q.v.bad; }\n\nfunction setContent(html){\n  const r=document.getElementById('root');\n  r.innerHTML=html; r.classList.remove('animate-in'); void r.offsetWidth; r.classList.add('animate-in');\n}\nfunction renderBurgers(n, el){\n  el.innerHTML='';\n  if(n===0){ el.innerHTML='<span style=\"font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700\">← рухай слайдер<\u002Fspan>'; return; }\n  if(n>20){ el.innerHTML='<span style=\"font-size:30px\">🍔<\u002Fspan><span class=\"px\" style=\"font-size:26px;color:var(--ink);margin-left:10px\">× '+n+'<\u002Fspan>'; return; }\n  for(let i=0;i<n;i++){ const b=document.createElement('span'); b.className='b'; b.textContent='🍔'; b.style.animationDelay=(i*0.025)+'s'; el.appendChild(b); }\n}\n\n/* ====== INTRO ====== */\nfunction renderIntro(){\n  stopShift(); alarm(false); setTheme(false);\n  setContent(`\n    <div class=\"screen\">\n      <div class=\"screen-eyebrow\">skvot <span class=\"p\" style=\"opacity:.45\">( )<\u002Fspan> Кухня<\u002Fdiv>\n      <div class=\"ticket-stub\"><span>СТАНЦІЯ · ГРИЛЬ<\u002Fspan><span>ЗМІНА · GTA<\u002Fspan><\u002Fdiv>\n      <div class=\"screen-title px\">Тобі<br>прийшло<br>замовлення<\u002Fdiv>\n      <div class=\"screen-sub\">Чек із питанням про GTA. Слайдер замість ваг. Відміряй рівно стільки бургерів, скільки правильна відповідь.<\u002Fdiv>\n      <div class=\"note-blackout\"><span class=\"bolt\">⚡<\u002Fspan> Між замовленнями може вимкнути світло.<\u002Fdiv>\n      <button class=\"primary-btn\" onclick=\"startGame()\" style=\"margin-top:26px\">Взяти замовлення →<\u002Fbutton>\n    <\u002Fdiv>\n  `);\n}\n\nfunction startGame(){\n  kitchenIdx=0; kitchenScore=0; blackoutScore=0; blackoutDone=false;\n  blQList=shuffle(BLACKOUT_Q_POOL).slice(0,6);\n  stopShift(); alarm(false); setTheme(false);\n  renderKitchenQ();\n}\n\n/* ====== KITCHEN ====== */\nfunction renderKitchenQ(){\n  const q=KITCHEN_Q[kitchenIdx];\n  const pct=(kitchenIdx/KITCHEN_Q.length)*100;\n  const init=Math.round((q.min+q.max)/2);\n  setContent(`\n    <div class=\"pass\">\n      <span class=\"brand\">skvot <span class=\"p\">( )<\u002Fspan> Кухня<\u002Fspan>\n      <span class=\"station\"><span class=\"dotlive\"><\u002Fspan>Замовлення ${kitchenIdx+1} / ${KITCHEN_Q.length}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"prog-track\"><div class=\"prog-fill\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n    ${shiftMode ? `<div class=\"shift-bar\"><span class=\"shift-label\"><span class=\"bolt\">⚡<\u002Fspan> Генератор барахлить<\u002Fspan><div class=\"shift-track\"><div class=\"shift-fill\" id=\"shift-fill\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>` : ``}\n    <div class=\"slip\">\n      <div class=\"slip-header\">\n        <div class=\"slip-meta\"><span class=\"slip-tag\">Замовлення<\u002Fspan><span class=\"slip-station\">Станція · ${q.station}<\u002Fspan><\u002Fdiv>\n        <span class=\"slip-num mono\"># ${q.num}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"slip-q\">${q.order}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"counter-area\"><span class=\"counter-num px\" id=\"cnum\">${init}<\u002Fspan><div class=\"counter-unit\">${q.unit}<\u002Fdiv><\u002Fdiv>\n    <div class=\"tray-label\">Видача<\u002Fdiv>\n    <div class=\"burger-grid\" id=\"bgrid\"><\u002Fdiv>\n    <div class=\"slider-wrap\">\n      <input type=\"range\" id=\"slider\" min=\"${q.min}\" max=\"${q.max}\" value=\"${init}\">\n      <div class=\"slider-labels mono\"><span>${q.min}<\u002Fspan><span>${q.max}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"primary-btn\" onclick=\"submitKitchen()\">Підтвердити замовлення →<\u002Fbutton>\n  `);\n  const slider=document.getElementById('slider'), cnum=document.getElementById('cnum'), bgrid=document.getElementById('bgrid');\n  renderBurgers(init,bgrid);\n  slider.addEventListener('input',()=>{\n    const v=parseInt(slider.value);\n    cnum.classList.remove('bump'); void cnum.offsetWidth; cnum.classList.add('bump');\n    cnum.textContent=v; renderBurgers(v,bgrid);\n  });\n  if(shiftMode) shiftResume();\n}\n\nfunction submitKitchen(){\n  shiftPause();\n  const q=KITCHEN_Q[kitchenIdx];\n  const val=parseInt(document.getElementById('slider').value);\n  const score=pts(q,val);\n  kitchenScore+=score;\n  const good = score>=2;                 // exact or close = right (green)\n  const yourGlow = good ? 'glow-ok' : 'glow-bad';\n  const vClass = good ? 'ok' : 'bad';\n  setContent(`\n    <div class=\"prog-track\"><div class=\"prog-fill\" style=\"width:${((kitchenIdx+1)/KITCHEN_Q.length*100)}%\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"result-cols\">\n      <div class=\"r-col ${yourGlow}\">\n        <div class=\"r-col-label\">Твоя відповідь<\u002Fdiv>\n        <div class=\"r-num px\">${val}<\u002Fdiv>\n        <div class=\"r-burgers\">${burgerStr(Math.min(val,15))}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"r-col glow-ok\">\n        <div class=\"r-col-label\">Правильно<\u002Fdiv>\n        <div class=\"r-num px\">${q.answer}<\u002Fdiv>\n        <div class=\"r-burgers\">${burgerStr(Math.min(q.answer,15))}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"verdict-text ${vClass}\">${verdict(q,val)}<\u002Fdiv>\n    <div class=\"fact-box\"><span class=\"fact-label\">Факт<\u002Fspan>${q.fact}<\u002Fdiv>\n    <button class=\"primary-btn\" onclick=\"afterKitchenQ()\">${kitchenIdx+1<KITCHEN_Q.length?'Наступне замовлення →':'Закрити кухню →'}<\u002Fbutton>\n  `);\n}\n\nfunction afterKitchenQ(){\n  kitchenIdx++;\n  if(kitchenIdx===2 && !blackoutDone){ triggerBlackout(()=>renderKitchenQ()); }\n  else if(kitchenIdx>=KITCHEN_Q.length){ renderFinal(); }\n  else { renderKitchenQ(); }\n}\n\n/* ====== BLACKOUT ====== */\nfunction triggerBlackout(onDone){\n  blackoutDone=true; afterBlackout=onDone;\n  blQIdx=0; blCorrect=0; blTimeLeft=1.0; blLastTs=null; blCanAnswer=true;\n  // lights out: flicker then switch to dark theme + alarm glow\n  document.body.classList.add('flicker');\n  setTimeout(()=>{ setTheme(true); alarm(true); }, 180);\n  setTimeout(()=>document.body.classList.remove('flicker'), 550);\n  renderBlackoutShell();\n  renderBlackoutQ();\n  blRafId=requestAnimationFrame(blTick);\n}\n\nfunction renderBlackoutShell(){\n  setContent(`\n    <div class=\"bl-timer-track\"><div class=\"bl-timer-fill\" id=\"bl-tbar\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"bl-header\">\n      <div class=\"bl-tag\">⚡ Екстра раунд<\u002Fdiv>\n      <div class=\"bl-title px\">Блекаут<\u002Fdiv>\n      <div class=\"bl-sub\">На кухні вимкнули світло<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bl-q-card bl-slide\" id=\"bl-card\"><div class=\"bl-q-text\" id=\"bl-qtext\">...<\u002Fdiv><\u002Fdiv>\n    <div class=\"bl-feedback\" id=\"bl-fb\"><\u002Fdiv>\n    <div class=\"bl-dots\" id=\"bl-dots\"><\u002Fdiv>\n    <div class=\"bl-btns\">\n      <button class=\"bl-btn bl-btn-yes\" id=\"bl-byes\" onclick=\"blAnswer(true)\">Так<\u002Fbutton>\n      <button class=\"bl-btn bl-btn-no\"  id=\"bl-bno\"  onclick=\"blAnswer(false)\">Ні<\u002Fbutton>\n    <\u002Fdiv>\n  `);\n}\n\nfunction renderBlackoutQ(){\n  const q=blQList[blQIdx];\n  const card=document.getElementById('bl-card'), qtxt=document.getElementById('bl-qtext'),\n        fb=document.getElementById('bl-fb'), dots=document.getElementById('bl-dots'),\n        byes=document.getElementById('bl-byes'), bno=document.getElementById('bl-bno');\n  if(qtxt) qtxt.textContent=q.t;\n  if(card) card.className='bl-q-card bl-slide';\n  if(fb){ fb.textContent=''; fb.className='bl-feedback'; }\n  if(byes) byes.disabled=false;\n  if(bno)  bno.disabled=false;\n  if(dots) dots.innerHTML=[0,1,2].map(i=>`<div class=\"bl-dot ${i<blQIdx?'done':i===blQIdx?'active':''}\"><\u002Fdiv>`).join('');\n}\n\nfunction blTick(ts){\n  if(!blLastTs) blLastTs=ts;\n  const dt=Math.min((ts-blLastTs)/1000,0.1); blLastTs=ts;\n  blTimeLeft=Math.max(0,blTimeLeft-BL_DRAIN*dt);\n  updateBlBar();\n  if(blTimeLeft<=0){ endBlackout(); return; }\n  blRafId=requestAnimationFrame(blTick);\n}\nfunction updateBlBar(){\n  const bar=document.getElementById('bl-tbar'); if(!bar) return;\n  bar.style.width=(blTimeLeft*100).toFixed(2)+'%';\n  bar.className='bl-timer-fill'+(blTimeLeft<0.25?' danger':'');\n}\n\nfunction blAnswer(isYes){\n  if(!blCanAnswer) return; blCanAnswer=false;\n  const q=blQList[blQIdx], ok=(isYes===q.a);\n  const card=document.getElementById('bl-card'), fb=document.getElementById('bl-fb'),\n        byes=document.getElementById('bl-byes'), bno=document.getElementById('bl-bno');\n  if(byes) byes.disabled=true; if(bno) bno.disabled=true;\n  if(ok){\n    blCorrect++; blTimeLeft=Math.min(1,blTimeLeft+BL_BONUS);\n    if(card) card.classList.add('flash-ok');\n    if(fb){ fb.textContent='✓ Вірно'; fb.className='bl-feedback ok'; }\n  } else {\n    blTimeLeft=Math.max(0,blTimeLeft-BL_PENALTY);\n    if(card){ card.classList.add('flash-bad','bl-shake'); }\n    if(fb){ fb.textContent='✗ Правильно: '+(q.a?'Так':'Ні'); fb.className='bl-feedback bad'; }\n  }\n  updateBlBar();\n  setTimeout(()=>{\n    if(blTimeLeft<=0) return;\n    blQIdx++;\n    if(blQIdx>=3){ endBlackout(); return; }\n    renderBlackoutQ(); blCanAnswer=true;\n  }, ok?400:750);\n}\n\nfunction endBlackout(){\n  cancelAnimationFrame(blRafId);\n  blackoutScore=blCorrect;\n\n  // 0 — didn't manage a single one: light never comes back, game stops here\n  if(blCorrect===0){\n    gameOver(true, \"Світло так<br>і не включилось\", \"Жодної правильної відповіді в темряві — зміна зірвана.\");\n    return;\n  }\n\n  const perfect = blCorrect===3;\n  const title = perfect ? \"Легенда<br>кухні\" : \"Генератор<br>барахлить\";\n  const sub = perfect\n    ? \"Навіть без світла не загубився\"\n    : \"Світло блимає — треба швидше закінчити зміну, поки не згасло знову\";\n  setContent(`\n    <div class=\"bl-result\">\n      <div class=\"bl-tag\" style=\"letter-spacing:.18em\">⚡ Блекаут завершено<\u002Fdiv>\n      <div class=\"bl-result-title px\">${title}<\u002Fdiv>\n      <div class=\"bl-result-sub\">${sub}<\u002Fdiv>\n      <div class=\"bl-score-badge ${perfect?'':'warn'}\">Блекаут · ${blCorrect} / 3<\u002Fdiv>\n      <button class=\"primary-btn\" onclick=\"closeBlackout()\" style=\"margin-top:18px;max-width:320px\">${perfect?'Світло повернулось →':'Скоріше на кухню →'}<\u002Fbutton>\n    <\u002Fdiv>\n  `);\n}\n\nfunction closeBlackout(){\n  const glitch = blCorrect>0 && blCorrect<3;\n  document.body.classList.add('flicker');\n  setTimeout(()=>{ setTheme(false); if(!glitch) alarm(false); }, 180);\n  setTimeout(()=>{\n    document.body.classList.remove('flicker');\n    if(glitch){ startShift(); alarm(false); }   // keep the pressure, drop the vignette\n    if(afterBlackout) afterBlackout();\n  }, 550);\n}\n\n/* ====== SHIFT TIMER (glitch mode) ====== */\nfunction startShift(){ shiftMode=true; shiftLeft=SHIFT_MS; shiftRunning=false; shiftLast=null; }\nfunction shiftResume(){\n  if(!shiftMode) return;\n  shiftRunning=true; shiftLast=null;\n  cancelAnimationFrame(shiftRafId);\n  shiftRafId=requestAnimationFrame(shiftTick);\n}\nfunction shiftPause(){ shiftRunning=false; cancelAnimationFrame(shiftRafId); }\nfunction stopShift(){ shiftMode=false; shiftRunning=false; cancelAnimationFrame(shiftRafId); }\nfunction shiftTick(now){\n  if(!shiftRunning) return;\n  if(shiftLast==null) shiftLast=now;\n  shiftLeft=Math.max(0, shiftLeft-(now-shiftLast)); shiftLast=now;\n  const fill=document.getElementById('shift-fill');\n  if(fill) fill.style.width=(shiftLeft/SHIFT_MS*100).toFixed(2)+'%';\n  if(shiftLeft<=0){\n    shiftPause(); shiftMode=false;\n    gameOver(true, \"Генератор<br>згорів\", \"Не встиг закінчити зміну до темряви — кухня закрита.\");\n    return;\n  }\n  shiftRafId=requestAnimationFrame(shiftTick);\n}\n\n/* ====== GAME OVER (no continue) ====== */\nfunction gameOver(dark, title, sub){\n  stopShift();\n  setTheme(dark); alarm(dark);\n  setContent(`\n    <div class=\"screen\" style=\"justify-content:center;text-align:center;padding-top:0\">\n      <div class=\"bl-tag\" style=\"letter-spacing:.18em;margin-bottom:16px\">⚡ Зміну зірвано<\u002Fdiv>\n      <div class=\"screen-title px\" style=\"text-align:center;margin-bottom:16px\">${title}<\u002Fdiv>\n      <div class=\"screen-sub\" style=\"margin:0 auto 34px;text-align:center;opacity:.85\">${sub}<\u002Fdiv>\n      <button class=\"primary-btn\" onclick=\"startGame()\" style=\"max-width:320px;margin:0 auto\">Нова зміна →<\u002Fbutton>\n    <\u002Fdiv>\n  `);\n}\n\n/* ====== FINAL ====== */\nfunction renderFinal(){\n  stopShift(); alarm(false); setTheme(false);\n  const maxK=KITCHEN_Q.length*3;\n  const total=kitchenScore+blackoutScore;\n  let chef, desc;\n  if(total>=maxK+2){ chef=\"Шеф-кухар GTA\"; desc=\"Точність кухні + реакція в блекауті. Rockstar би найняли.\"; }\n  else if(total>=maxK){ chef=\"Досвідчений кухар\"; desc=\"Кухня — чисто. Блекаут — непогано.\"; }\n  else if(kitchenScore>=maxK-2){ chef=\"Кухар з нервами\"; desc=\"Блекаут трохи збив, але кухня тримається.\"; }\n  else { chef=\"Стажер\"; desc=\"Ще трохи практики — і GTA розкриється повністю.\"; }\n  setContent(`\n    <div class=\"screen\">\n      <div class=\"screen-eyebrow\">skvot <span class=\"p\" style=\"opacity:.45\">( )<\u002Fspan> Результат<\u002Fdiv>\n      <div class=\"ticket-stub\"><span>ЗМІНА ЗАКРИТА<\u002Fspan><span>GTA<\u002Fspan><\u002Fdiv>\n      <div class=\"screen-title px\">Кухня<br>закрита<\u002Fdiv>\n      <div class=\"score-card\">\n        <div class=\"score-big px\">${kitchenScore}<span class=\"slash\"> / ${maxK}<\u002Fspan><\u002Fdiv>\n        <div class=\"score-sub\">балів точності<\u002Fdiv>\n        <div class=\"score-bl\"><span class=\"bolt\">⚡<\u002Fspan> Блекаут · ${blackoutScore} / 3<\u002Fdiv>\n        <div class=\"score-title px\">${chef}<\u002Fdiv>\n        <div class=\"score-desc\">${desc}<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"primary-btn\" onclick=\"startGame()\">Нова зміна →<\u002Fbutton>\n    <\u002Fdiv>\n  `);\n}\n\nrenderIntro();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
